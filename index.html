<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Builder MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        /* Print Engine Optimizations */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; margin: 0 !important; padding: 0 !important; }
            .print-container { 
                box-shadow: none !important; 
                margin: 0 !important; 
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
            }
            .cv-preview { 
                padding: 1cm 1.5cm !important; 
                border: none !important;
                min-height: auto !important;
            }
            @page { size: A4; margin: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .cv-preview {
            background: white;
            min-height: 29.7cm;
            width: 21cm;
            padding: 1.5cm 2cm;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            margin: 2rem auto;
            transition: all 0.3s ease;
        }

        .input-group label { @apply block text-[10px] font-black text-slate-500 uppercase tracking-tighter mb-1; }
        .input-group input, .input-group textarea { 
            @apply w-full border border-slate-200 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all;
        }

        .section-header { 
            @apply flex items-center border-b-2 border-slate-100 pb-1 mb-3 mt-4;
        }
        .section-header h2 { @apply font-black text-slate-900 text-xs uppercase tracking-widest; }
        
        .skill-tag {
            @apply inline-block bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-[10px] font-bold mr-1 mb-1;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <!-- Sidebar Editor -->
    <aside class="no-print w-full md:w-[480px] bg-white border-r border-slate-200 overflow-y-auto custom-scroll p-6 flex flex-col">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-slate-900 italic">CV_MVP.v1</h1>
                <div class="flex gap-2 mt-2">
                    <button onclick="setLanguage('en')" id="lang-en" class="px-2 py-1 text-[10px] font-bold rounded bg-slate-900 text-white">EN</button>
                    <button onclick="setLanguage('it')" id="lang-it" class="px-2 py-1 text-[10px] font-bold rounded bg-slate-100 text-slate-400">IT</button>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="resetData()" class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Reset">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full text-xs font-black shadow-lg shadow-blue-200 transition-all active:scale-95">
                    EXPORT PDF
                </button>
            </div>
        </div>

        <div class="space-y-8 pb-20">
            <!-- 1. Header Details -->
            <section>
                <h2 class="text-[11px] font-black text-blue-600 uppercase mb-4 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-blue-600 rounded-full"></span> 
                    <span data-i18n="sec-details">Personal Details</span>
                </h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-group col-span-2"><label data-i18n="lab-name">Name</label><input type="text" id="in-name" oninput="saveAndRefresh()"></div>
                    <div class="input-group col-span-2"><label data-i18n="lab-title">Professional Title</label><input type="text" id="in-title" oninput="saveAndRefresh()"></div>
                    <div class="input-group"><label>Email</label><input type="email" id="in-email" oninput="saveAndRefresh()"></div>
                    <div class="input-group"><label data-i18n="lab-phone">Phone</label><input type="text" id="in-phone" oninput="saveAndRefresh()"></div>
                    <div class="input-group col-span-2"><label data-i18n="lab-location">Location</label><input type="text" id="in-location" oninput="saveAndRefresh()"></div>
                </div>
            </section>

            <!-- 2. Profile -->
            <section>
                <h2 class="text-[11px] font-black text-blue-600 uppercase mb-3" data-i18n="sec-summary">Profile</h2>
                <textarea id="in-summary" rows="3" class="w-full border border-slate-200 rounded p-2 text-sm" oninput="saveAndRefresh()"></textarea>
            </section>

            <!-- 3. Dynamic Lists (Experience, etc) -->
            <div id="dynamic-inputs-area"></div>

            <!-- 4. Skills Tab System -->
            <section class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                <h2 class="text-[11px] font-black text-slate-400 uppercase mb-3" data-i18n="sec-skills">Skills</h2>
                <div class="flex gap-1 mb-3 bg-white p-1 rounded-lg border border-slate-200">
                    <button id="tab-hard-btn" onclick="switchSkillTab('hard')" class="flex-1 py-1.5 text-[10px] font-bold rounded bg-blue-600 text-white">HARD SKILLS</button>
                    <button id="tab-soft-btn" onclick="switchSkillTab('soft')" class="flex-1 py-1.5 text-[10px] font-bold rounded text-slate-400">SOFT SKILLS</button>
                </div>
                <textarea id="in-skills-area" rows="3" class="text-xs w-full p-2 border rounded" oninput="handleSkillInput(this.value)"></textarea>
            </section>

            <!-- 5. Legal -->
            <section>
                <h2 class="text-[11px] font-black text-slate-400 uppercase mb-3" data-i18n="sec-legal">Legal</h2>
                <div class="flex gap-2 mb-2">
                    <button onclick="applyLegal('en')" class="text-[9px] bg-slate-200 px-2 py-1 rounded font-bold hover:bg-slate-300">AUTO EN</button>
                    <button onclick="applyLegal('it')" class="text-[9px] bg-slate-200 px-2 py-1 rounded font-bold hover:bg-slate-300">AUTO IT</button>
                </div>
                <textarea id="in-legal" rows="2" class="w-full text-xs p-2 border rounded" oninput="saveAndRefresh()"></textarea>
            </section>
        </div>
    </aside>

    <!-- Preview Surface -->
    <main class="flex-1 overflow-y-auto custom-scroll p-4 md:p-8 bg-slate-100">
        <div id="cv-render" class="cv-preview print-container text-[12px]">
            <header class="mb-8">
                <h1 id="out-name" class="text-4xl font-black text-slate-900 mb-1 tracking-tight"></h1>
                <p id="out-title" class="text-[14px] text-blue-600 font-bold mb-4 tracking-wider uppercase"></p>
                <div class="flex flex-wrap gap-x-6 gap-y-1 text-[10px] text-slate-500 font-bold border-t border-slate-100 pt-3">
                    <div id="out-email-box"><span class="text-blue-500">E:</span> <span id="out-email"></span></div>
                    <div id="out-phone-box"><span class="text-blue-500">P:</span> <span id="out-phone"></span></div>
                    <div id="out-location-box"><span class="text-blue-500">L:</span> <span id="out-location"></span></div>
                </div>
            </header>

            <section class="mb-6">
                <div class="section-header"><h2 data-cv-i18n="profile">Profile</h2></div>
                <p id="out-summary" class="text-slate-600 leading-relaxed text-justify"></p>
            </section>

            <div id="cv-sections-list"></div>

            <section class="mb-6 grid grid-cols-2 gap-10">
                <div>
                    <div class="section-header"><h2 data-cv-i18n="hardSkills">Hard Skills</h2></div>
                    <div id="out-hard-skills" class="flex flex-wrap"></div>
                </div>
                <div>
                    <div class="section-header"><h2 data-cv-i18n="softSkills">Soft Skills</h2></div>
                    <div id="out-soft-skills" class="flex flex-wrap"></div>
                </div>
            </section>

            <footer class="mt-auto pt-4 border-t border-slate-100">
                <p id="out-legal" class="text-[9px] text-slate-400 italic leading-tight text-justify"></p>
            </footer>
        </div>
    </main>

    <script>
        const translations = {
            en: {
                "sec-details": "Personal Details", "lab-name": "Full Name", "lab-title": "Title", "lab-phone": "Phone", "lab-location": "Location",
                "sec-summary": "Summary", "sec-skills": "Skills", "sec-legal": "Legal", "add-btn": "+ ADD",
                "profile": "Profile", "experience": "Professional Experience", "internship": "Internships", "volunteer": "Volunteer Experience",
                "education": "Education", "projects": "Personal Projects", "hardSkills": "Hard Skills", "softSkills": "Soft Skills",
                "role": "Position", "org": "Company / Organization", "dates": "Period", "desc": "Description & Achievements",
                "degree": "Degree", "school": "Institution",
                "legal-def": "I hereby authorize the use of my personal data in accordance with GDPR (EU 2016/679).",
                "placeholders": { "name": "Your Name", "title": "Job Title", "summary": "Highly motivated professional..." }
            },
            it: {
                "sec-details": "Dati Personali", "lab-name": "Nome Completo", "lab-title": "Qualifica", "lab-phone": "Cellulare", "lab-location": "Residenza",
                "sec-summary": "Profilo", "sec-skills": "Competenze", "sec-legal": "Privacy", "add-btn": "+ AGGIUNGI",
                "profile": "Profilo Professionale", "experience": "Esperienze Lavorative", "internship": "Stage e Tirocini", "volunteer": "Volontariato",
                "education": "Formazione", "projects": "Progetti Personali", "hardSkills": "Competenze Tecniche", "softSkills": "Competenze Trasversali",
                "role": "Posizione", "org": "Azienda / Ente", "dates": "Periodo", "desc": "Responsabilità e Traguardi",
                "degree": "Titolo", "school": "Istituto / Università",
                "legal-def": "Autorizzo il trattamento dei miei dati personali ai sensi del D.Lgs. 196/2003 e del GDPR (UE 2016/679).",
                "placeholders": { "name": "Tuo Nome", "title": "Qualifica Professionale", "summary": "Professionista esperto..." }
            }
        };

        let currentLang = localStorage.getItem('cv_lang') || 'en';
        let data = JSON.parse(localStorage.getItem('cv_data')) || {
            experience: [], internship: [], volunteer: [], education: [], projects: []
        };
        let skills = JSON.parse(localStorage.getItem('cv_skills')) || { hard: '', soft: '' };
        let activeSkillTab = 'hard';

        function saveAndRefresh() {
            const formData = {
                name: document.getElementById('in-name').value,
                title: document.getElementById('in-title').value,
                email: document.getElementById('in-email').value,
                phone: document.getElementById('in-phone').value,
                location: document.getElementById('in-location').value,
                summary: document.getElementById('in-summary').value,
                legal: document.getElementById('in-legal').value
            };
            localStorage.setItem('cv_form', JSON.stringify(formData));
            localStorage.setItem('cv_data', JSON.stringify(data));
            localStorage.setItem('cv_skills', JSON.stringify(skills));
            updateCV();
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('cv_lang', lang);
            
            document.getElementById('lang-en').className = lang === 'en' ? "px-2 py-1 text-[10px] font-bold rounded bg-slate-900 text-white" : "px-2 py-1 text-[10px] font-bold rounded bg-slate-100 text-slate-400";
            document.getElementById('lang-it').className = lang === 'it' ? "px-2 py-1 text-[10px] font-bold rounded bg-slate-900 text-white" : "px-2 py-1 text-[10px] font-bold rounded bg-slate-100 text-slate-400";

            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = translations[lang][el.getAttribute('data-i18n')]);
            document.querySelectorAll('[data-cv-i18n]').forEach(el => el.innerText = translations[lang][el.getAttribute('data-cv-i18n')]);

            renderInputs();
            updateCV();
        }

        function addItem(type) {
            data[type].push({ id: Date.now(), role: '', org: '', period: '', desc: '' });
            renderInputs();
            saveAndRefresh();
        }

        function removeItem(type, id) {
            data[type] = data[type].filter(i => i.id !== id);
            renderInputs();
            saveAndRefresh();
        }

        function handleUpdate(type, id, field, val) {
            const item = data[type].find(i => i.id === id);
            if (item) item[field] = val;
            saveAndRefresh();
        }

        function renderInputs() {
            const order = [
                { id: 'experience', label: 'experience' },
                { id: 'internship', label: 'internship' },
                { id: 'volunteer', label: 'volunteer' },
                { id: 'education', label: 'education' },
                { id: 'projects', label: 'projects' }
            ];

            const html = order.map(sec => `
                <section>
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${translations[currentLang][sec.label]}</h2>
                        <button onclick="addItem('${sec.id}')" class="text-blue-600 text-[10px] font-black hover:underline">${translations[currentLang]['add-btn']}</button>
                    </div>
                    <div class="space-y-2">
                        ${data[sec.id].map(item => `
                            <div class="p-3 bg-slate-50 rounded border border-slate-100 relative group">
                                <button onclick="removeItem('${sec.id}', ${item.id})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500">×</button>
                                <input type="text" class="mb-1 font-bold !bg-transparent border-none p-0 h-6 focus:ring-0" placeholder="${sec.id === 'education' ? translations[currentLang]['degree'] : translations[currentLang]['role']}" value="${item.role}" oninput="handleUpdate('${sec.id}', ${item.id}, 'role', this.value)">
                                <input type="text" class="mb-1 block w-full text-xs !bg-transparent border-none p-0 h-5 focus:ring-0" placeholder="${sec.id === 'education' ? translations[currentLang]['school'] : translations[currentLang]['org']}" value="${item.org}" oninput="handleUpdate('${sec.id}', ${item.id}, 'org', this.value)">
                                <input type="text" class="mb-1 block w-full text-[10px] !bg-transparent border-none p-0 h-4 focus:ring-0 uppercase font-black" placeholder="${translations[currentLang]['dates']}" value="${item.period}" oninput="handleUpdate('${sec.id}', ${item.id}, 'period', this.value)">
                                <textarea class="text-[11px] w-full bg-white border border-slate-200 rounded p-1" rows="2" placeholder="${translations[currentLang]['desc']}" oninput="handleUpdate('${sec.id}', ${item.id}, 'desc', this.value)">${item.desc}</textarea>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');

            document.getElementById('dynamic-inputs-area').innerHTML = html;
        }

        function updateCV() {
            const savedForm = JSON.parse(localStorage.getItem('cv_form')) || {};
            const p = translations[currentLang].placeholders;

            document.getElementById('out-name').innerText = document.getElementById('in-name').value || p.name;
            document.getElementById('out-title').innerText = document.getElementById('in-title').value || p.title;
            document.getElementById('out-email').innerText = document.getElementById('in-email').value || '';
            document.getElementById('out-phone').innerText = document.getElementById('in-phone').value || '';
            document.getElementById('out-location').innerText = document.getElementById('in-location').value || '';
            document.getElementById('out-summary').innerText = document.getElementById('in-summary').value || p.summary;
            document.getElementById('out-legal').innerText = document.getElementById('in-legal').value || '';

            // Hide empty contact info
            document.getElementById('out-email-box').style.display = document.getElementById('in-email').value ? 'block' : 'none';
            document.getElementById('out-phone-box').style.display = document.getElementById('in-phone').value ? 'block' : 'none';
            document.getElementById('out-location-box').style.display = document.getElementById('in-location').value ? 'block' : 'none';

            const order = ['experience', 'internship', 'volunteer', 'education', 'projects'];
            document.getElementById('cv-sections-list').innerHTML = order.map(sec => {
                if (data[sec].length === 0) return '';
                return `
                    <section class="mb-6">
                        <div class="section-header"><h2>${translations[currentLang][sec]}</h2></div>
                        <div class="space-y-4">
                            ${data[sec].map(item => `
                                <div>
                                    <div class="flex justify-between items-baseline">
                                        <h3 class="font-extrabold text-slate-900 text-[13px]">${item.role || ''}</h3>
                                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${item.period || ''}</span>
                                    </div>
                                    <p class="text-blue-600 font-bold text-[11px] mb-1">${item.org || ''}</p>
                                    <p class="text-slate-600 leading-relaxed text-[11.5px] whitespace-pre-wrap">${item.desc || ''}</p>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `;
            }).join('');

            renderSkills();
        }

        function renderSkills() {
            const h = skills.hard.split(',').filter(s => s.trim()).map(s => `<span class="skill-tag">${s.trim()}</span>`).join('');
            const s = skills.soft.split(',').filter(s => s.trim()).map(s => `<span class="skill-tag">${s.trim()}</span>`).join('');
            document.getElementById('out-hard-skills').innerHTML = h;
            document.getElementById('out-soft-skills').innerHTML = s;
        }

        function switchSkillTab(tab) {
            activeSkillTab = tab;
            const h = document.getElementById('tab-hard-btn');
            const s = document.getElementById('tab-soft-btn');
            h.className = tab === 'hard' ? "flex-1 py-1.5 text-[10px] font-bold rounded bg-blue-600 text-white" : "flex-1 py-1.5 text-[10px] font-bold rounded text-slate-400";
            s.className = tab === 'soft' ? "flex-1 py-1.5 text-[10px] font-bold rounded bg-blue-600 text-white" : "flex-1 py-1.5 text-[10px] font-bold rounded text-slate-400";
            document.getElementById('in-skills-area').value = skills[tab];
        }

        function handleSkillInput(v) { skills[activeSkillTab] = v; saveAndRefresh(); }
        function applyLegal(l) { document.getElementById('in-legal').value = translations[l]['legal-def']; saveAndRefresh(); }
        
        function resetData() {
            if(confirm("Sei sicuro di voler cancellare tutto?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('cv_form'));
            if(saved) {
                Object.keys(saved).forEach(key => {
                    const el = document.getElementById('in-' + key);
                    if(el) el.value = saved[key];
                });
            }
            setLanguage(currentLang);
        };
    </script>
</body>
</html>
