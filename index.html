<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder MVP - Multi-Language & Multi-Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; }
        
        /* Ottimizzazione Stampa Multipagina */
        @media print {
            .no-print { display: none !important; }
            body, html { 
                background-color: white !important; 
                height: auto !important;
                overflow: visible !important;
            }
            .app-wrapper { 
                display: block !important; 
                height: auto !important;
            }
            .main-content {
                display: block !important;
                height: auto !important;
                overflow: visible !important;
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
            }
            .cv-preview { 
                box-shadow: none !important; 
                margin: 0 !important; 
                width: 100% !important;
                padding: 1.5cm 2cm !important;
                border: none !important;
                height: auto !important;
                min-height: 0 !important;
            }
            section { page-break-inside: avoid; margin-bottom: 1.5rem; }
            @page { 
                size: A4; 
                margin: 1.5cm 0;
            }
        }

        /* UI Layout */
        .app-wrapper {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 450px;
            background: white;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            padding: 24px;
            z-index: 20;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            background: #cbd5e1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .cv-preview {
            background: white;
            width: 21cm;
            min-height: 29.7cm;
            padding: 1.8cm 2cm;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            height: fit-content;
        }

        .input-group label { @apply block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1; }
        .input-group input, .input-group textarea { 
            @apply w-full border border-slate-200 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all;
        }

        .section-header { 
            @apply flex items-center border-b-2 border-slate-100 pb-1 mb-3 mt-4;
        }
        .section-header h2 { @apply font-black text-slate-900 text-[11px] uppercase tracking-widest; }
        
        .skill-tag {
            @apply inline-block bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-[10px] font-bold mr-1 mb-1 border border-slate-200;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- Sidebar Editor -->
        <aside class="no-print sidebar custom-scroll">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-xl font-black tracking-tighter text-slate-900 italic">CV_BUILDER</h1>
                    <div class="flex gap-1 mt-2">
                        <button onclick="setLanguage('en')" id="lang-en" class="px-2 py-1 text-[9px] font-black rounded border transition-all">EN</button>
                        <button onclick="setLanguage('it')" id="lang-it" class="px-2 py-1 text-[9px] font-black rounded border transition-all">IT</button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="resetData()" class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Reset">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                    <button id="btn-print" onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-[10px] font-black shadow-lg shadow-blue-200 transition-all active:scale-95 uppercase tracking-wider">
                        STAMPA CV
                    </button>
                </div>
            </div>

            <div class="space-y-8 pb-20">
                <!-- Anagrafica -->
                <section>
                    <h2 class="text-[11px] font-black text-blue-600 uppercase mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-blue-600 rounded-full"></span> 
                        <span data-i18n="sec-details">Dati Personali</span>
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="input-group col-span-2"><label data-i18n="lab-name">Nome</label><input type="text" id="in-name" oninput="saveAndRefresh()"></div>
                        <div class="input-group col-span-2"><label data-i18n="lab-title">Qualifica</label><input type="text" id="in-title" oninput="saveAndRefresh()"></div>
                        <div class="input-group"><label>Email</label><input type="email" id="in-email" oninput="saveAndRefresh()"></div>
                        <div class="input-group"><label data-i18n="lab-phone">Telefono</label><input type="text" id="in-phone" oninput="saveAndRefresh()"></div>
                        <div class="input-group col-span-2"><label data-i18n="lab-location">Località</label><input type="text" id="in-location" oninput="saveAndRefresh()"></div>
                    </div>
                </section>

                <section>
                    <h2 class="text-[11px] font-black text-blue-600 uppercase mb-3" data-i18n="sec-summary">Profilo</h2>
                    <textarea id="in-summary" rows="3" class="w-full border border-slate-200 rounded p-2 text-sm" oninput="saveAndRefresh()"></textarea>
                </section>

                <div id="dynamic-inputs-area"></div>

                <section class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <h2 class="text-[11px] font-black text-slate-400 uppercase mb-3" data-i18n="sec-skills">Competenze</h2>
                    <div class="flex gap-1 mb-3 bg-white p-1 rounded-lg border border-slate-200">
                        <button id="tab-hard-btn" onclick="switchSkillTab('hard')" class="flex-1 py-1.5 text-[10px] font-bold rounded transition-colors">HARD SKILLS</button>
                        <button id="tab-soft-btn" onclick="switchSkillTab('soft')" class="flex-1 py-1.5 text-[10px] font-bold rounded transition-colors">SOFT SKILLS</button>
                    </div>
                    <textarea id="in-skills-area" rows="3" class="text-xs w-full p-2 border rounded" oninput="handleSkillInput(this.value)"></textarea>
                </section>

                <section>
                    <h2 class="text-[11px] font-black text-slate-400 uppercase mb-3" data-i18n="sec-legal">Privacy</h2>
                    <div class="flex gap-2 mb-2">
                        <button onclick="applyLegal('en')" class="text-[8px] bg-slate-200 px-2 py-1 rounded font-bold hover:bg-slate-300">AUTO GDPR EN</button>
                        <button onclick="applyLegal('it')" class="text-[8px] bg-slate-200 px-2 py-1 rounded font-bold hover:bg-slate-300">AUTO GDPR IT</button>
                    </div>
                    <textarea id="in-legal" rows="2" class="w-full text-[10px] p-2 border rounded text-slate-500" oninput="saveAndRefresh()"></textarea>
                </section>
            </div>
        </aside>

        <!-- Preview Surface -->
        <main class="main-content custom-scroll">
            <div id="cv-render" class="cv-preview text-[12px]">
                <header class="mb-8">
                    <h1 id="out-name" class="text-4xl font-black text-slate-900 mb-1 tracking-tight"></h1>
                    <p id="out-title" class="text-[14px] text-blue-600 font-bold mb-4 tracking-wider uppercase"></p>
                    <div class="flex flex-wrap gap-x-6 gap-y-1 text-[10px] text-slate-500 font-bold border-t border-slate-100 pt-3">
                        <div id="out-email-box"><span class="text-blue-500">E:</span> <span id="out-email"></span></div>
                        <div id="out-phone-box"><span class="text-blue-500">P:</span> <span id="out-phone"></span></div>
                        <div id="out-location-box"><span class="text-blue-500">L:</span> <span id="out-location"></span></div>
                    </div>
                </header>

                <section class="mb-6">
                    <div class="section-header"><h2 data-cv-i18n="profile">Profilo</h2></div>
                    <p id="out-summary" class="text-slate-600 leading-relaxed text-justify italic"></p>
                </section>

                <div id="cv-sections-list"></div>

                <section class="mb-6 grid grid-cols-2 gap-10">
                    <div>
                        <div class="section-header"><h2 data-cv-i18n="hardSkills">Competenze</h2></div>
                        <div id="out-hard-skills" class="flex flex-wrap"></div>
                    </div>
                    <div>
                        <div class="section-header"><h2 data-cv-i18n="softSkills">Soft Skills</h2></div>
                        <div id="out-soft-skills" class="flex flex-wrap"></div>
                    </div>
                </section>

                <footer class="mt-8 pt-4 border-t border-slate-100">
                    <p id="out-legal" class="text-[9px] text-slate-400 italic leading-tight text-justify"></p>
                </footer>
            </div>
        </main>
    </div>

    <script>
        const translations = {
            en: {
                "btn-print": "EXPORT PDF",
                "sec-details": "Details", "lab-name": "Full Name", "lab-title": "Title", "lab-phone": "Phone", "lab-location": "Location",
                "sec-summary": "Summary", "sec-skills": "Skills", "sec-legal": "Legal", "add-btn": "+ ADD",
                "profile": "Professional Profile", "experience": "Experience", "internship": "Internships", "volunteer": "Volunteering",
                "education": "Education", "projects": "Personal Projects", "hardSkills": "Hard Skills", "softSkills": "Soft Skills",
                "role": "Position", "org": "Organization", "dates": "Dates", "desc": "Achievements & Role",
                "degree": "Degree", "school": "Institution",
                "legal-def": "I hereby authorize the use of my personal data in accordance with GDPR (EU 2016/679).",
                "placeholders": { "name": "John Doe", "title": "Senior Lead", "summary": "Profile summary..." }
            },
            it: {
                "btn-print": "STAMPA CV",
                "sec-details": "Dati", "lab-name": "Nome", "lab-title": "Qualifica", "lab-phone": "Cellulare", "lab-location": "Residenza",
                "sec-summary": "Profilo", "sec-skills": "Competenze", "sec-legal": "Privacy", "add-btn": "+ AGGIUNGI",
                "profile": "Profilo Professionale", "experience": "Esperienze Lavorative", "internship": "Stage", "volunteer": "Volontariato",
                "education": "Istruzione", "projects": "Progetti", "hardSkills": "Hard Skills", "softSkills": "Soft Skills",
                "role": "Ruolo", "org": "Azienda / Ente", "dates": "Periodo", "desc": "Dettagli e Risultati",
                "degree": "Titolo", "school": "Istituto",
                "legal-def": "Autorizzo il trattamento dei miei dati personali ai sensi del D.Lgs. 196/2003 e del GDPR (UE 2016/679).",
                "placeholders": { "name": "Mario Rossi", "title": "Responsabile", "summary": "Breve descrizione professionale..." }
            }
        };

        let currentLang = localStorage.getItem('cv_lang') || 'it';
        let data = JSON.parse(localStorage.getItem('cv_data')) || {
            experience: [], internship: [], volunteer: [], education: [], projects: []
        };
        let skills = JSON.parse(localStorage.getItem('cv_skills')) || { hard: '', soft: '' };
        let activeSkillTab = 'hard';

        function saveAndRefresh() {
            const formData = {
                name: document.getElementById('in-name').value,
                title: document.getElementById('in-title').value,
                email: document.getElementById('in-email').value,
                phone: document.getElementById('in-phone').value,
                location: document.getElementById('in-location').value,
                summary: document.getElementById('in-summary').value,
                legal: document.getElementById('in-legal').value
            };
            localStorage.setItem('cv_form', JSON.stringify(formData));
            localStorage.setItem('cv_data', JSON.stringify(data));
            localStorage.setItem('cv_skills', JSON.stringify(skills));
            updateCV();
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('cv_lang', lang);
            
            // Aggiorna pulsante di stampa
            document.getElementById('btn-print').innerText = translations[lang]['btn-print'];

            // UI Styling selettore lingua
            document.getElementById('lang-en').className = lang === 'en' ? "px-2 py-1 text-[9px] font-black rounded border border-blue-600 bg-blue-600 text-white" : "px-2 py-1 text-[9px] font-black rounded border border-slate-200 text-slate-400 bg-white";
            document.getElementById('lang-it').className = lang === 'it' ? "px-2 py-1 text-[9px] font-black rounded border border-blue-600 bg-blue-600 text-white" : "px-2 py-1 text-[9px] font-black rounded border border-slate-200 text-slate-400 bg-white";

            // Traduzione etichette statiche
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = translations[lang][el.getAttribute('data-i18n')]);
            document.querySelectorAll('[data-cv-i18n]').forEach(el => el.innerText = translations[lang][el.getAttribute('data-cv-i18n')]);

            renderInputs();
            updateCV();
        }

        function addItem(type) {
            data[type].push({ id: Date.now(), role: '', org: '', period: '', desc: '' });
            renderInputs();
            saveAndRefresh();
        }

        function removeItem(type, id) {
            data[type] = data[type].filter(i => i.id !== id);
            renderInputs();
            saveAndRefresh();
        }

        function handleUpdate(type, id, field, val) {
            const item = data[type].find(i => i.id === id);
            if (item) item[field] = val;
            saveAndRefresh();
        }

        function renderInputs() {
            const order = [
                { id: 'experience', label: 'experience' },
                { id: 'internship', label: 'internship' },
                { id: 'volunteer', label: 'volunteer' },
                { id: 'education', label: 'education' },
                { id: 'projects', label: 'projects' }
            ];

            const html = order.map(sec => `
                <section>
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${translations[currentLang][sec.label]}</h2>
                        <button onclick="addItem('${sec.id}')" class="text-blue-600 text-[10px] font-black hover:underline">${translations[currentLang]['add-btn']}</button>
                    </div>
                    <div class="space-y-2">
                        ${data[sec.id].map(item => `
                            <div class="p-3 bg-slate-50 rounded border border-slate-100 relative mb-2">
                                <button onclick="removeItem('${sec.id}', ${item.id})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 font-bold transition-colors">×</button>
                                <input type="text" class="mb-1 font-bold !bg-transparent border-none p-0 h-6 focus:ring-0 text-slate-900" placeholder="${sec.id === 'education' ? translations[currentLang]['degree'] : translations[currentLang]['role']}" value="${item.role}" oninput="handleUpdate('${sec.id}', ${item.id}, 'role', this.value)">
                                <input type="text" class="mb-1 block w-full text-xs !bg-transparent border-none p-0 h-5 focus:ring-0 text-slate-500" placeholder="${sec.id === 'education' ? translations[currentLang]['school'] : translations[currentLang]['org']}" value="${item.org}" oninput="handleUpdate('${sec.id}', ${item.id}, 'org', this.value)">
                                <input type="text" class="mb-1 block w-full text-[10px] !bg-transparent border-none p-0 h-4 focus:ring-0 uppercase font-black text-blue-500" placeholder="${translations[currentLang]['dates']}" value="${item.period}" oninput="handleUpdate('${sec.id}', ${item.id}, 'period', this.value)">
                                <textarea class="text-[11px] w-full bg-white border border-slate-200 rounded p-1" rows="2" placeholder="${translations[currentLang]['desc']}" oninput="handleUpdate('${sec.id}', ${item.id}, 'desc', this.value)">${item.desc}</textarea>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');

            document.getElementById('dynamic-inputs-area').innerHTML = html;
        }

        function updateCV() {
            const p = translations[currentLang].placeholders;

            document.getElementById('out-name').innerText = document.getElementById('in-name').value || p.name;
            document.getElementById('out-title').innerText = document.getElementById('in-title').value || p.title;
            document.getElementById('out-email').innerText = document.getElementById('in-email').value || '';
            document.getElementById('out-phone').innerText = document.getElementById('in-phone').value || '';
            document.getElementById('out-location').innerText = document.getElementById('in-location').value || '';
            document.getElementById('out-summary').innerText = document.getElementById('in-summary').value || p.summary;
            document.getElementById('out-legal').innerText = document.getElementById('in-legal').value || '';

            document.getElementById('out-email-box').style.display = document.getElementById('in-email').value ? 'block' : 'none';
            document.getElementById('out-phone-box').style.display = document.getElementById('in-phone').value ? 'block' : 'none';
            document.getElementById('out-location-box').style.display = document.getElementById('in-location').value ? 'block' : 'none';

            const order = ['experience', 'internship', 'volunteer', 'education', 'projects'];
            document.getElementById('cv-sections-list').innerHTML = order.map(sec => {
                if (data[sec].length === 0) return '';
                return `
                    <section class="mb-6">
                        <div class="section-header"><h2>${translations[currentLang][sec]}</h2></div>
                        <div class="space-y-4">
                            ${data[sec].map(item => `
                                <div>
                                    <div class="flex justify-between items-baseline">
                                        <h3 class="font-extrabold text-slate-900 text-[13px] tracking-tight">${item.role || ''}</h3>
                                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${item.period || ''}</span>
                                    </div>
                                    <p class="text-blue-600 font-bold text-[10.5px] mb-1 uppercase tracking-wide italic">${item.org || ''}</p>
                                    <p class="text-slate-600 leading-relaxed text-[11.5px] whitespace-pre-wrap text-justify">${item.desc || ''}</p>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `;
            }).join('');

            renderSkills();
        }

        function renderSkills() {
            const h = skills.hard.split(',').filter(s => s.trim()).map(s => `<span class="skill-tag">${s.trim()}</span>`).join('');
            const s = skills.soft.split(',').filter(s => s.trim()).map(s => `<span class="skill-tag">${s.trim()}</span>`).join('');
            document.getElementById('out-hard-skills').innerHTML = h;
            document.getElementById('out-soft-skills').innerHTML = s;
        }

        function switchSkillTab(tab) {
            activeSkillTab = tab;
            const h = document.getElementById('tab-hard-btn');
            const s = document.getElementById('tab-soft-btn');
            h.className = tab === 'hard' ? "flex-1 py-1.5 text-[10px] font-bold rounded bg-blue-600 text-white" : "flex-1 py-1.5 text-[10px] font-bold rounded text-slate-400 bg-white border border-slate-200";
            s.className = tab === 'soft' ? "flex-1 py-1.5 text-[10px] font-bold rounded bg-blue-600 text-white" : "flex-1 py-1.5 text-[10px] font-bold rounded text-slate-400 bg-white border border-slate-200";
            document.getElementById('in-skills-area').value = skills[tab];
        }

        function handleSkillInput(v) { skills[activeSkillTab] = v; saveAndRefresh(); }
        function applyLegal(l) { document.getElementById('in-legal').value = translations[l]['legal-def']; saveAndRefresh(); }
        
        function resetData() {
            if(confirm("Attenzione: vuoi eliminare tutti i dati salvati?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => {
            const savedForm = JSON.parse(localStorage.getItem('cv_form'));
            if(savedForm) {
                Object.keys(savedForm).forEach(key => {
                    const el = document.getElementById('in-' + key);
                    if(el) el.value = savedForm[key];
                });
            }
            setLanguage(currentLang);
            switchSkillTab('hard');
        };
    </script>
</body>
</html>
